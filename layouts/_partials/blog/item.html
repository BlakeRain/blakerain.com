<div class="flex flex-col gap-2">
  <a href="{{ .RelPermalink }}" class="colored">
    <h1 class="text-2xl font-bold">{{ .Title }}</h1>
  </a>
  <div class="flex flex-col uppercase text-xs">
    <div class="flex flex-row gap-1 text-sm">
      <div class="text-neutral-700 dark:text-neutral-300">
        {{ .Date | time.Format "2 Jan 2006" }}
      </div>
      <div class="text-gray-500">&#8226;</div>
      <div>{{ .ReadingTime }} min read</div>
    </div>
    {{ with .Param "tags" }}
      <div class="leading-none flex flex-row flex-wrap gap-x-2 gap-y-0 mt-1">
        {{ range $index, $tag := . }}
          {{ with site.GetPage (printf "/tags/%s" $tag) }}
            <a
              href="{{ .Permalink }}"
              class="text-slate-700 dark:text-slate-500 hover:text-slate-800 hover:dark:text-slate-400">
              {{ $tag | humanize }}
            </a>
          {{ end }}
        {{ end }}
      </div>
    {{ end }}
  </div>
</div>
{{ if .Summary }}
  <div class="markdown">
    {{ .Summary }}
  </div>
{{ end }}

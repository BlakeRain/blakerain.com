<article class="{{ if not .first }}pt-8 border-t border-t-neutral-300 dark:border-t-neutral-700{{ end }}">
  {{ with .note }}
    <div class="grid grid-cols-[max-content_1fr_max-content] gap-x-4 gap-y-1 items-center mb-4">
      <a class="colored text-lg font-semibold" href="{{ .Permalink }}">
        {{ $parts := strings.Split (index (strings.Split .File.Dir "/") 1) "-" }}
        {{ index $parts 0 }} - Week {{ index $parts 1 }}
      </a>
      <div class="h-0 border-t border-dashed border-neutral-500"></div>
      <div class="text-neutral-700 dark:text-neutral-300">
        {{ .Date | time.Format "2 Jan 2006" }}
      </div>
      <div class="col-span-3 text-neutral-700 dark:text-neutral-300 italic">
        {{ .Summary }}
      </div>
    </div>
  {{ end }}
</article>

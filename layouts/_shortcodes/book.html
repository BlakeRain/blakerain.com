<div class="grid grid-cols-[8rem_1fr] gap-5 p-5 border border-neutral-200 dark:border-none rounded-md bg-white dark:bg-neutral-800 rounded-md bg-white dark:bg-neutral-800 mb-6">
  <div class="book-cover">
    <a href="{{ .Get "url" }}" target="_blank" rel="noopener">
      <img class="block w-full h-auto rounded-md" src="{{ .Get "cover" }}" alt="Book Cover of {{ .Get "title" }}">
    </a>
  </div>
  <div class="book-content">
    <h3 class="text-2xl mt-0 mb-1">
      <a class="no-underline text-blue-700 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300" href="{{ .Get "url" }}" target="_blank" rel="noopener">
        {{ .Get "title" }}
      </a>
    </h3>
    <div class="flex flex-row flex-wrap gap-x-1 gap-y-0 text-sm text-gray-500 dark:text-gray-400 mb-3">
      <div>{{ .Get "author" }}</div>
      {{ with .Get "year" }}
        <div class="text-gray-500">&#8226;</div>
        <div>{{ . }}</div>
      {{ end }}
      {{ with .Get "pages" }}
        <div class="text-gray-500">&#8226;</div>
        <div>{{ . }}</div>
      {{ end }}
    </div>
    <p class="mb-2">
      {{ .Inner | markdownify }}
    </p>
    <a class="no-underline text-blue-700 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300" href="{{ .Get "url" }}" target="_blank" rel="noopener">
      View book {{ partial "icons/icon" (dict "vendor" "lucide" "name" "arrow-right") }}
    </a>
  </div>
</div>

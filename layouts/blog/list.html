{{ define "main" }}
<main class="articles-list content">
  <h1>
    Blog
  </h1>
  <div class="items separated">
    {{ $pager := .Paginate .Pages 10 }}
    {{ range $pager.Pages }}
      {{ with partial "article/item.html" . }}
        {{ if .Summary }}
          {{ .Summary }}
        {{ end }}
      {{ end }}
    {{ end }}
    {{ partial "pager" $pager }}
  </div>
</main>
{{ end }}

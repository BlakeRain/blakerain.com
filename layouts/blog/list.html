{{ define "main" }}
<main class="grow mx-auto mt-4 lg:mt-8 mb-20 content">
  <h1 class="text-4xl md:text-5xl font-bold text-center text-neutral-800 dark:text-neutral-200">
    Blog
  </h1>
  <div class="flex flex-col gap-8 mt-12 mb-10 p-4 lg:p-0">
    {{ $pager := .Paginate .Pages 10 }}
    {{ range first 1 $pager.Pages }}
      {{ partial "blog/item" . }}
    {{ end }}
    {{ range after 1 $pager.Pages }}
      <div class="h-0 border-t border-dashed border-neutral-500"></div>
      {{ partial "blog/item" . }}
    {{ end }}
    {{ partial "pager" $pager }}
  </div>
</main>
{{ end }}

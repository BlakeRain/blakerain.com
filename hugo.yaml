baseURL: https://blakerain.com/
languageCode: en-GB
title: Blake Rain

params:
  author:
    name: Blake Rain
    email: blake@blakerain.com

mainSections:
  - blog
  - notes
  - weeknotes

menus:
  footer_right:
    - name: Tags
      pageRef: /tags
      weight: 10
    - name: RSS
      url: /index.xml
      weight: 10

taxonomies:
  tag: tags

related:
  includeNewer: true
  threshold: 80
  indices:
    - name: tags
      type: basic
      weight: 80
      toLower: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    wrapperClass: highlight
  tableOfContents:
    ordered: true
    startLevel: 1
    endLevel: 5

outputs:
  home: ["html", "rss"]
  section: ["html", "rss"]
  taxonomy: ["html"]
  term: ["html"]

module:
  hugoVersion:
    min: 0.154.0
  imports:
    - path: github.com/hugomods/icons/vendors/devicons
    - path: github.com/hugomods/icons/vendors/lucide
    - path: github.com/hugomods/icons/vendors/mdi
    - path: github.com/hugomods/icons/vendors/bootstrap
    - path: github.com/hugomods/icons/vendors/font-awesome
    - path: github.com/hugomods/icons/vendors/simple-icons
    - path: github.com/hugomods/encoder
  mounts:
    - source: assets
      target: assets

build:
  cachebusters:
    - source: postcss\.config\.js
      target: css
    - source: assets/.*\.(js|ts|jsx|tsx)
      target: js
    - source: assets/.*\.(.*)$
      target: $1

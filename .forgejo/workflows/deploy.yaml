name: deploy

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  deploy-site:
    runs-on: docker
    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v2
        with:
          node-version: 25

      - name: Install node dependencies
        run: |
          npm i

      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.26

      - name: Setup Hugo
        uses: https://github.com/peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build the site
        run: |
          echo "Writing tag ${FORGEJO_REF_NAME} to data/tag.json"
          echo "{\"tag\":\"${FORGEJO_REF_NAME}\"}" > data/tag.json
          cat data/tag.json
          hugo --minify

      - name: Deploy the site
        env:
          BUNNY_STORAGE_HOST: ${{ secrets.BUNNY_STORAGE_HOST }}
          BUNNY_STORAGE_USERNAME: ${{ secrets.BUNNY_STORAGE_USERNAME }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
        run: |
          apt-get update -y
          apt-get install -y lftp
          lftp -u "${BUNNY_STORAGE_USERNAME},${BUNNY_STORAGE_PASSWORD}" \
            "sftp://${BUNNY_STORAGE_HOST}" \
            -e "set sftp:auto-confirm yes; mirror -R --delete --verbose public/ /; quit"

      - name: Purge CDN cache
        run: |
          curl -sf -X POST \
            "https://api.bunny.net/pullzone/${{ secrets.BUNNY_PULLZONE_ID }}/purgeCache" \
            -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}" \
            -H "Content-Length: 0"
